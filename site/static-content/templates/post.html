<!DOCTYPE html>
<html lang="en">
    <head>
        {% include "meta" %}

        <link rel="preload" href="{{ content_dir }}\assets\font\LEMONMILK.otf" as="font" crossorigin="anonymous">
        <link rel="stylesheet" href="{{ content_dir }}\assets\style\{{ page.style | default: "post" }}.css">
    </head>
    <body>
        {% include "header" %}
        <div class="container">
            <div class="container-head">
                <h1>{{ page.title }}</h1>
                {%- if page.subtext %}
                <p>{{ page.subtext }}</p>
                {%- endif %}

                {%- for tag in page.tags %}
                <div class="tag-chip"> {{ tag }} </div>
                {%- endfor %}
            </div>
            <div class="container-content">
                {{ page.content }}
            </div>
        </div>
        {% include "footer" %}
    </body>
</html>
