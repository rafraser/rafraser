<html lang="en">
    <head>
        {% include "meta" %}

        <link rel="stylesheet" href="{{ content_dir }}\assets\style\{{ page.style | default: "page_list" }}.css">
    </head>
    <body>
        {% include "header" %}
        <div class="container">
            <div class="paginate-description">
                <div class="post-head-left">
                    <h1>{{ page.title }}</h1>
                    {{ page.content }}
                </div>
                <div class="post-head-right">
                </div>
            </div>

            <div class="paginate-posts">
                {%- for view in paginate.pages %}
                {% include "post_head_page" %}
                {% endfor %}
            </div>

            {% include "paginate_controls" %}
        </div>
        {% include "footer" %}
    </body>
</html>
